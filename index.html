<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex Tracker</title>
    <meta name="description" content="Track your Pokémon collection across Gen III and Gen IV. Includes Pokédex, route encounter tables, catch calculator, IV checker, EV tracker, team designer, and move browser." />
    <meta property="og:title" content="Pokédex Tracker" />
    <meta property="og:description" content="Track your Pokémon collection across Gen III and Gen IV. Pokédex, routes, catch calculator, IV/EV tools, and more." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pokedex.shrumslab.com/" />
    <meta property="og:image" content="https://pokedex.shrumslab.com/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Pokédex Tracker" />
    <meta name="twitter:description" content="Track your Pokémon collection across Gen III and Gen IV. Pokédex, routes, catch calculator, IV/EV tools, and more." />
    <script>
      (function() {
        var t = localStorage.getItem('pdx-theme') || 'dark';
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content — default dark bg with per-theme overrides */
      html { background-color: #030712; }
      html[data-theme="burnished"] { background-color: #09080c; }
      body { margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
