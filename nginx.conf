# ── Rate limiting ─────────────────────────────────────────────────────────────
# 10 requests/minute per IP on the sync API, burst of 5.
# Normal usage is at most 1 push every 2 s — this won't affect real use.
limit_req_zone $binary_remote_addr zone=sync_limit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-Frame-Options          "DENY"                            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    # Enable HSTS after HTTPS is confirmed working (tells browsers to always use HTTPS).
    add_header Strict-Transport-Security "max-age=31536000"               always;

    # ── Health check (no rate limiting — needed for login screen + TrueNAS) ──
    location = /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_read_timeout 5s;
        proxy_connect_timeout 3s;
    }

    # ── WebSocket sync endpoint (no rate limiting — long-lived connection) ────
    location = /api/ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 5s;
    }

    # ── Sync API proxy (login + health) ──────────────────────────────────────
    # The sync server runs on port 3001 inside the same container.
    # Proxied through nginx so browser requests stay same-origin (no CORS needed).
    # Auth enforced by the sync server via Bearer token.
    location /api/ {
        limit_req zone=sync_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    # ── Hashed assets (JS, CSS, images, fonts) ────────────────────────────────
    # Vite appends a content hash to every asset filename (e.g. index-BVB3d2I4.js),
    # so a 1-year immutable cache is safe — the filename changes when content changes.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Pokémon data file ──────────────────────────────────────────────────────
    location = /data/pokemon.json {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
